name: F-Droid APK (reproducible)

# Publishes a signed release APK (for F-Droid reproducible-build verification)
# WITHOUT touching the Play Store AAB pipeline (release.yml). The APK is built
# with the same release keystore and the same FOSS prebuild as the F-Droid
# metadata, so fdroidserver's from-source build can byte-match it.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v3.2.1)'
        required: true
        default: 'v3.2.1'

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building reproducible APK for $TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          # Full history so VERSION_DISPLAY's commit-count matches F-Droid's full checkout.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Apply FOSS prebuild (mirror F-Droid metadata)
        run: sed -i '/com.google.android.play.privacy-policy-url/d' app/src/main/AndroidManifest.xml

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password='${{ secrets.KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.KEY_PASSWORD }}'

      - name: Cleanup keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.keystore"

      - name: Stage APK (stable name)
        run: |
          cp app/build/outputs/apk/release/app-release.apk zazentimer.apk
          ls -la zazentimer.apk

      - name: Attach APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
          gh release upload "$TAG" zazentimer.apk --clobber

      - name: Cleanup old releases (keep newest 10 v* releases; keep git tags)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t old < <(gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].tagName' | grep '^v' | tail -n +11)
          for t in "${old[@]}"; do
            echo "Deleting old release page: $t (git tag kept)"
            gh release delete "$t" --yes 2>/dev/null || true
          done
